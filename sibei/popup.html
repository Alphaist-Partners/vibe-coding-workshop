<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>灵感收集器</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="popup">
  <div class="popup-container">
    <header class="popup-header">
      <h1>💡 灵感收集器</h1>
    </header>

    <div class="popup-content">
      <textarea id="contentInput" placeholder="粘贴文字或链接..." rows="4"></textarea>
      <input type="text" id="urlInput" placeholder="来源 URL（可选）">

      <div class="popup-actions">
        <button id="saveBtn" class="btn btn-primary">保存到灵感库</button>
      </div>

      <div class="popup-links">
        <a href="dashboard.html" class="link">打开管理界面 →</a>
        <a href="#" id="settingsLink" class="link">设置 API Key →</a>
      </div>
    </div>

    <div id="notification" class="notification"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
